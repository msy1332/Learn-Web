<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudDriveView</title>
    <style>
      * {
        padding: 0px;
        margin: 0px;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        display: flex;
      }
      .side_bar {
        width: 20%;
        height: 100%;
        background-color: rgb(27, 26, 26);
        color: rgb(161, 161, 170);

        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
      }
      .content {
        width: 80%;
        height: 100%;
        background-color: rgb(10, 9, 6);
      }

      .side_bar .title{
        width: 100%;
        height: 8%;
      }
      .side_bar .nav{
        width: 100%;
        height: 92%;
      }
      .side_bar .nav ul{
        list-style-type: none;
        width: 100%;
        height: 100%;

        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        row-gap: 10px;

      }
      .side_bar .nav ul li{
        width: 80%;
        height: 35px;
        background-color: rgb(31, 31, 31);
        border-radius: 20px;

        transition: background-color;
        transition-duration: 0.2s;
      }
      .side_bar .nav ul li label{
        display: block;
        width: 100%;
        height: 100%;
      }
      .side_bar .nav ul li label input{
        display: none;
      }
      .side_bar .nav ul li:has(label input:checked),.side_bar .nav ul li:hover{
        background-color: rgb(47, 47, 47);
        color: rgb(225, 225, 225);
      }
    </style>
  </head>
  <body>
    <!-- 侧边栏 -->
    <div class="side_bar">
      <!-- 标题 -->
      <div class="title">
        <h1>小麦的网盘</h1>
      </div>
      <!-- 导航 -->
      <div class="nav">
        <ul>
            <li class="nav_menu">
                <label>
                    <input type="radio" name="nav_menu">
                    Lorem.
                </label>
            </li>
            <li class="nav_menu">
                <label>
                    <input type="radio" name="nav_menu">
                    endis.
                </label>
            </li>
            <li class="nav_menu">
                <label>
                    <input type="radio" name="nav_menu">
                    ellat?
                </label>
            </li>
            <li class="nav_menu">
                <label>
                    <input type="radio" name="nav_menu">
                    strum!
                </label>
            </li>
        </ul>
      </div>
    </div>
    <!-- 内容 -->
    <div class="content"></div>
  </body>
</html>
